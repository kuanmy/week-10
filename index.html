<!DOCTYPE html>
<html>
<head>
  <title>Global Internet Usage</title>
  <!-- Import Vega & Vega-Lite (does not have to be from CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/vega@5.20.2"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5.1.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6.17.0"></script>

  <!-- Import Pure CSS -->
  <link rel="stylesheet" href="https://unpkg.com/purecss@2.0.3/build/pure-min.css" integrity="sha384-cg6SkqEOCV1NbJoCu11+bm0NvBRc8IYLRGXkmNrqUBfTjmMYwNKPWBTIKyw9mHNJ" crossorigin="anonymous">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Import Google font -->
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- Import self-defined CSS styles -->
  <link rel="stylesheet" type="text/css" href="css/styles.css" media="all">
</head>
<body>

 <div class="page">
    <div class="pure-g">
      <div class="pure-u-1-1">
        <h1>Global Internet Usage</h1>
      </div>
    </div>

    <div class="pure-g">
        <div class="pure-u-1">
          <div id="vis1" class="vis-container"></div>
        </div>
    </div>

    <div class="pure-g">
        <div class="pure-u-1">
          <div id="vis2"  class="vis-container"></div>
        </div>   
    </div>

    <div class="pure-g">
        <div class="pure-u-1">
        </div>   
    </div>
  
    <div class="pure-g">
      <div class="pure-u-1-1 small-font">
        <p>Designer: Meng Yi Kuan | Data Source: <a href="https://www.kaggle.com/sansuthi/gapminder-internet" target="_blank">gapminder-internet</a></p>
      </div>
    </div>

  </div> <!-- end page -->
   
<script type="text/javascript">
  var specVis1 = "js/choropleth_map.vg.json";
  var specVis2= "js/bubble.vg.json";

  vegaEmbed('#vis1', specVis1, {"actions": false}).then(function(result) {
    // Access the Vega view instance (https://vega.github.io/vega/docs/api/view/) as result.view
  }).catch(console.error);
  
   vegaEmbed('#vis2', specVis2, {"actions": false}).then(function(result) {
    // Access the Vega view instance (https://vega.github.io/vega/docs/api/view/) as result.view
  }).catch(console.error);

</script>
</body>
</html>
